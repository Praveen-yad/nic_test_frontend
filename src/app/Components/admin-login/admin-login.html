<div class="login-container">
  <h2>Admin Login</h2>

  <label>Username</label>
  <input
    type="text"
    placeholder="Username"
    [(ngModel)]="username"
  />

  <label>Password</label>
  <input
    type="password"
    placeholder="Password"
    [(ngModel)]="password"
  />

  <button (click)="login()">Login</button>

</div>
